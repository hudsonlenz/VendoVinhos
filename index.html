<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VendoVinhos</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzMiAzMic+CiAgPHJlY3Qgd2lkdGg9JzMyJyBoZWlnaHQ9JzMyJyByeD0nNicgZmlsbD0nI2Y3ZjRlZScvPgogIDxwYXRoIGQ9J00xMSA0aDEwbC0xIDlhNCA0IDAgMCAxLTMgMy45VjIzaDN2MkgxMnYtMmgzdi02LjFBNCA0IDAgMCAxIDEyIDEzeicgZmlsbD0nbm9uZScgc3Ryb2tlPScjMWIxODE1JyBzdHJva2Utd2lkdGg9JzEuNCcgc3Ryb2tlLWxpbmVqb2luPSdyb3VuZCcvPgogIDxwYXRoIGQ9J00xMS42IDZoOC44bC0uNSA0LjNIMTIuMXonIGZpbGw9JyM2YjFlMmInLz4KPC9zdmc+Cg==">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <h1 class="logo">VendoVinhos</h1>
    <div class="topbar-right">
      <span class="order-line">Faça o seu pedido: (47) 99967-4451</span>
      <button id="themeToggle" class="theme-toggle" aria-label="Alternar tema escuro" title="Alternar tema">
        <svg id="iconSun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"></circle><line x1="12" y1="1.5" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22.5"></line><line x1="4.2" y1="4.2" x2="5.9" y2="5.9"></line><line x1="18.1" y1="18.1" x2="19.8" y2="19.8"></line><line x1="1.5" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22.5" y2="12"></line><line x1="4.2" y1="19.8" x2="5.9" y2="18.1"></line><line x1="18.1" y1="5.9" x2="19.8" y2="4.2"></line></svg>
        <svg id="iconMoon" class="hidden" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20.5 14.5a8.5 8.5 0 0 1-11-11 8.5 8.5 0 1 0 11 11z"></path></svg>
      </button>
      <button id="staffToggle" class="staff-btn">Área da equipe</button>
    </div>
  </div>
  <div class="rule"></div>
</header>

<main>
  <div class="controls">
    <input id="searchInput" type="text" placeholder="Buscar por nome, uva ou safra..." class="search-input">
    <div id="filterChips" class="filter-chips"></div>
    <button id="addWineBtn" class="staff-btn add-wine-btn hidden">+ Adicionar vinho</button>
  </div>

  <div id="wineGrid" class="wine-grid">
    <p class="loading">Carregando carta de vinhos…</p>
  </div>
</main>

<footer class="footer">
  <p>VendoVinhos</p>
</footer>

<!-- Login modal -->
<div id="loginModal" class="modal-overlay hidden">
  <div class="modal">
    <button class="modal-close" id="closeLogin">&times;</button>
    <h2>Área da equipe</h2>
    <p class="modal-sub">Entre para marcar vinhos como vendidos.</p>
    <form id="loginForm">
      <label>E-mail</label>
      <input type="email" id="loginEmail" required autocomplete="username">
      <label>Senha</label>
      <div class="password-wrap">
        <input type="password" id="loginPassword" required autocomplete="current-password">
        <button type="button" id="togglePassword" class="toggle-password" aria-label="Mostrar senha">Mostrar</button>
      </div>
      <p id="loginError" class="error-text hidden"></p>
      <button type="submit" class="primary-btn">Entrar</button>
    </form>
  </div>
</div>

<!-- Sale confirmation modal -->
<div id="saleModal" class="modal-overlay hidden">
  <div class="modal">
    <button class="modal-close" id="closeSale">&times;</button>
    <h2 id="saleWineName">Registrar venda</h2>
    <p class="modal-sub">Confirme a saída de estoque.</p>
    <form id="saleForm">
      <label>Quantidade vendida</label>
      <input type="number" id="saleQty" min="1" value="1" required>
      <p class="stock-hint" id="saleStockHint"></p>
      <button type="submit" class="primary-btn">Confirmar venda</button>
    </form>
  </div>
</div>

<!-- Edit wine modal -->
<div id="editModal" class="modal-overlay hidden">
  <div class="modal modal-wide">
    <button class="modal-close" id="closeEdit">&times;</button>
    <h2 id="editModalTitle">Editar vinho</h2>
    <p class="modal-sub" id="editModalSub">Altere as informações e/ou a foto do anúncio.</p>
    <form id="editForm">
      <label>Nome</label>
      <input type="text" id="editName" required>

      <label>Safra</label>
      <input type="text" id="editVintage" placeholder="ex: 2022">

      <label>Categoria</label>
      <input type="text" id="editCategory" required>

      <label>Descrição</label>
      <textarea id="editDescription" rows="4"></textarea>

      <label>Preço (R$)</label>
      <input type="number" step="0.01" id="editPrice" required>

      <label>Estoque</label>
      <input type="number" id="editStock" min="0" required>

      <label>Fotos da garrafa</label>
      <div id="editPhotosGrid" class="edit-photos-grid"></div>
      <input type="file" id="editImageFile" accept="image/*,.heic,.heif" multiple>
      <p class="stock-hint" id="editImageStatus"></p>

      <p id="editError" class="error-text hidden"></p>
      <button type="submit" class="primary-btn">Salvar alterações</button>
    </form>
  </div>
</div>

<!-- Lightbox: foto ampliada + detalhes do vinho -->
<div id="lightbox" class="lightbox hidden">
  <button id="closeLightbox" class="lightbox-close">&times;</button>
  <div id="lightboxContent" class="lightbox-content">
    <div class="lightbox-media">
      <button id="lightboxPrev" class="lightbox-nav lightbox-nav-prev hidden" aria-label="Foto anterior">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <div id="lightboxStage" class="lightbox-stage">
        <img id="lightboxImg" src="" alt="">
      </div>
      <button id="lightboxNext" class="lightbox-nav lightbox-nav-next hidden" aria-label="Próxima foto">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
      <div id="lightboxThumbs" class="lightbox-thumbs hidden"></div>
      <div id="lightboxCounter" class="lightbox-counter"></div>
    </div>
    <div class="lightbox-info">
      <p id="lightboxCategory" class="lightbox-category"></p>
      <h2 id="lightboxName" class="lightbox-wine-name"></h2>
      <p id="lightboxDesc" class="lightbox-wine-desc"></p>
      <p id="lightboxPrice" class="lightbox-wine-price"></p>
      <a id="lightboxWhatsapp" class="whatsapp-btn" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.6-.8-1.9-.9-.3-.1-.4-.1-.6.1-.2.3-.7.9-.8 1-.1.2-.3.2-.6.1-.3-.1-1.2-.5-2.3-1.5-.9-.8-1.4-1.7-1.6-2-.1-.3 0-.4.1-.6.1-.1.3-.3.4-.5.1-.1.2-.3.2-.4.1-.2 0-.3 0-.5-.1-.1-.6-1.5-.8-2-.2-.5-.4-.5-.6-.5h-.5c-.2 0-.5.1-.7.3-.3.3-1 1-1 2.4 0 1.4 1 2.8 1.2 3 .1.2 2 3.1 5 4.3.7.3 1.2.5 1.7.6.7.2 1.3.2 1.8.1.6-.1 1.6-.7 1.9-1.3.2-.6.2-1.1.2-1.3-.1-.1-.3-.2-.6-.3z"/><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.5A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3.2-.4-4.6-1.3l-.3-.2-3.1.9.9-3-.2-.3A8.2 8.2 0 1 1 12 20.2z"/></svg>
        Reservar no WhatsApp
      </a>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<div class="cursor-dot"></div>

<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
