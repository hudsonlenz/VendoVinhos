<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vejo Vinho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <h1 class="logo">Carta de vinhos</h1>
    <div class="topbar-right">
      <span class="order-line">Faça o seu pedido: (47) 99967-4451</span>
      <button id="staffToggle" class="staff-btn">Área da equipe</button>
    </div>
  </div>
  <div class="rule"></div>
</header>

<main>
  <div class="controls">
    <input id="searchInput" type="text" placeholder="Buscar por nome, uva ou safra..." class="search-input">
    <div id="filterChips" class="filter-chips"></div>
    <button id="addWineBtn" class="staff-btn add-wine-btn hidden">+ Adicionar vinho</button>
  </div>

  <div id="wineGrid" class="wine-grid">
    <p class="loading">Carregando carta de vinhos…</p>
  </div>
</main>

<footer class="footer">
  <p>Carta de vinhos</p>
</footer>

<!-- Login modal -->
<div id="loginModal" class="modal-overlay hidden">
  <div class="modal">
    <button class="modal-close" id="closeLogin">&times;</button>
    <h2>Área da equipe</h2>
    <p class="modal-sub">Entre para marcar vinhos como vendidos.</p>
    <form id="loginForm">
      <label>E-mail</label>
      <input type="email" id="loginEmail" required autocomplete="username">
      <label>Senha</label>
      <div class="password-wrap">
        <input type="password" id="loginPassword" required autocomplete="current-password">
        <button type="button" id="togglePassword" class="toggle-password" aria-label="Mostrar senha">Mostrar</button>
      </div>
      <p id="loginError" class="error-text hidden"></p>
      <button type="submit" class="primary-btn">Entrar</button>
    </form>
  </div>
</div>

<!-- Sale confirmation modal -->
<div id="saleModal" class="modal-overlay hidden">
  <div class="modal">
    <button class="modal-close" id="closeSale">&times;</button>
    <h2 id="saleWineName">Registrar venda</h2>
    <p class="modal-sub">Confirme a saída de estoque.</p>
    <form id="saleForm">
      <label>Quantidade vendida</label>
      <input type="number" id="saleQty" min="1" value="1" required>
      <p class="stock-hint" id="saleStockHint"></p>
      <button type="submit" class="primary-btn">Confirmar venda</button>
    </form>
  </div>
</div>

<!-- Edit wine modal -->
<div id="editModal" class="modal-overlay hidden">
  <div class="modal modal-wide">
    <button class="modal-close" id="closeEdit">&times;</button>
    <h2 id="editModalTitle">Editar vinho</h2>
    <p class="modal-sub" id="editModalSub">Altere as informações e/ou a foto do anúncio.</p>
    <form id="editForm">
      <label>Nome</label>
      <input type="text" id="editName" required>

      <label>Safra</label>
      <input type="text" id="editVintage" placeholder="ex: 2022">

      <label>Categoria</label>
      <input type="text" id="editCategory" required>

      <label>Descrição</label>
      <textarea id="editDescription" rows="4"></textarea>

      <label>Preço (R$)</label>
      <input type="number" step="0.01" id="editPrice" required>

      <label>Estoque</label>
      <input type="number" id="editStock" min="0" required>

      <label>Fotos da garrafa</label>
      <div id="editPhotosGrid" class="edit-photos-grid"></div>
      <input type="file" id="editImageFile" accept="image/*,.heic,.heif" multiple>
      <p class="stock-hint" id="editImageStatus"></p>

      <p id="editError" class="error-text hidden"></p>
      <button type="submit" class="primary-btn">Salvar alterações</button>
    </form>
  </div>
</div>

<!-- Lightbox: foto ampliada, com navegação -->
<div id="lightbox" class="lightbox hidden">
  <button id="closeLightbox" class="lightbox-close">&times;</button>
  <button id="lightboxPrev" class="lightbox-nav lightbox-nav-prev hidden" aria-label="Foto anterior">&#8249;</button>
  <div id="lightboxStage" class="lightbox-stage">
    <img id="lightboxImg" src="" alt="">
  </div>
  <button id="lightboxNext" class="lightbox-nav lightbox-nav-next hidden" aria-label="Próxima foto">&#8250;</button>
  <div id="lightboxCounter" class="lightbox-counter"></div>
</div>

<div id="toast" class="toast hidden"></div>

<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
